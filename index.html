<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Blomigenkänning</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#f4f7f4;
}

h1{
    margin-top:30px;
}

.credit{
    font-size:20px;
    font-weight:bold;
    margin-bottom:20px;
}

#statusBox{
    border:2px solid #333;
    display:inline-block;
    padding:15px;
    margin:20px;
    background:white;
}

#preview{
    max-width:300px;
    margin-top:20px;
}

#result{
    font-size:22px;
    margin-top:20px;
}
</style>
</head>

<body>

<h1>Blomigenkänning</h1>
<div class="credit">Anton H – TE23C</div>

<div id="statusBox">
Modellstatus: <span id="status">Laddar modell...</span>
</div>

<br>

<input type="file" id="imageUpload" accept="image/*">

<br>
<img id="preview">

<div id="result"></div>

<script>

let model;
const statusText = document.getElementById("status");
const resultDiv = document.getElementById("result");
const preview = document.getElementById("preview");


const labels = [
"daisy",
"dandelion",
"rose",
"sunflower",
"tulip"
];

async function loadModel(){

    try{
        model = await tf.loadLayersModel("tfjs_model/model.json");
        statusText.textContent = "Modell laddad ✔";
    }
    catch(error){
        statusText.textContent = "Fel vid laddning av modell ❌";
        console.error(error);
    }

}

loadModel();

document.getElementById("imageUpload").addEventListener("change", async function(event){

    const file = event.target.files[0];

    if(!file || !model){
        return;
    }

    const img = new Image();
    img.src = URL.createObjectURL(file);

    img.onload = async function(){

        preview.src = img.src;

        const tensor = tf.browser.fromPixels(img)
            .resizeNearestNeighbor([224,224])
            .toFloat()
            .div(255.0)
            .expandDims();

        const prediction = model.predict(tensor);
        const data = await prediction.data();

        let maxIndex = 0;

        for(let i=1;i<data.length;i++){
            if(data[i] > data[maxIndex]){
                maxIndex = i;
            }
        }

        const probability = (data[maxIndex]*100).toFixed(2);

        const label = labels[maxIndex] || "Klass " + maxIndex;

        resultDiv.innerHTML =
        "Identifierad blomma: <b>" + label + "</b><br>" +
        "Sannolikhet: <b>" + probability + "%</b>";

    }

});

</script>

</body>
</html>
